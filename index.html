<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umpra — Something Beautiful is Coming</title>
  <meta name="description" content="Umpra — your everyday, on your terms. A thoughtful approach to daily wellness is taking shape. Stay close.">

  <!-- Open Graph -->
  <meta property="og:title" content="Umpra — Something Beautiful is Coming">
  <meta property="og:description" content="Your everyday, on your terms. A thoughtful approach to daily wellness is taking shape.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://umpra.com">

  <!-- Google Fonts: Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       Reset
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img, svg { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button, input, textarea { font: inherit; color: inherit; }
    ul, ol { list-style: none; }

    /* ============================================
       Tokens (Elegant + zinc monochrome)
       ============================================ */
    :root {
      --zinc-950: #09090b;
      --zinc-900: #18181b;
      --zinc-800: #27272a;
      --zinc-700: #3f3f46;
      --zinc-600: #52525b;
      --zinc-500: #71717a;
      --zinc-400: #a1a1aa;
      --zinc-300: #d4d4d8;
      --zinc-200: #e4e4e7;
      --zinc-100: #f4f4f5;
      --zinc-50: #fafafa;
      --white: #ffffff;
      --color-error: #dc2626;

      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;

      /* Elegant type scale: 14/16/18/24/32/40 */
      --text-xs: 0.8125rem;   /* 13px */
      --text-sm: 0.875rem;    /* 14px */
      --text-base: 1rem;      /* 16px */
      --text-lg: 1.125rem;    /* 18px */
      --text-xl: 1.5rem;      /* 24px */
      --text-2xl: 2rem;       /* 32px */
      --text-3xl: 2.5rem;     /* 40px */
      --text-4xl: 3rem;       /* 48px */
      --text-5xl: 3.75rem;    /* 60px */

      /* Elegant spacing: 4/8/12/16/24/32 */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-10: 40px;
      --space-12: 48px;
      --space-16: 64px;
      --space-20: 80px;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --transition: 0.2s ease;
    }

    ::selection {
      background: rgba(9, 9, 11, 0.08);
    }

    /* ============================================
       Skip Link
       ============================================ */
    .skip-link {
      position: absolute;
      top: -100%;
      left: var(--space-4);
      z-index: 9999;
      padding: var(--space-2) var(--space-4);
      background: var(--zinc-900);
      color: var(--white);
      font-family: var(--font);
      font-weight: 500;
      font-size: var(--text-sm);
      border-radius: var(--radius-sm);
      transition: top var(--transition);
    }
    .skip-link:focus { top: var(--space-4); }

    /* ============================================
       Focus-Visible
       ============================================ */
    a:focus-visible,
    input:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--zinc-900);
      outline-offset: 2px;
    }

    /* ============================================
       Page Background + Grid Pattern
       ============================================ */
    body {
      font-family: var(--font);
      font-weight: 400;
      color: var(--zinc-900);
      background-color: var(--zinc-50);
      background-image:
        linear-gradient(rgba(228, 228, 231, 0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(228, 228, 231, 0.4) 1px, transparent 1px);
      background-size: 64px 64px;
      background-position: -1px -1px;
    }

    /* ============================================
       Container
       ============================================ */
    .container {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 var(--space-6);
    }

    /* ============================================
       Page Layout
       ============================================ */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-8) 0;
    }

    /* ============================================
       Logo
       ============================================ */
    .logo {
      width: 160px;
      margin-bottom: var(--space-12);
    }

    .logo svg {
      width: 100%;
      height: auto;
    }

    /* ============================================
       Logo Star Animation
       ============================================ */
    .logo svg {
      animation: logo-breathe 4s ease-in-out infinite;
    }

    @keyframes logo-breathe {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    /* ============================================
       Hero Card (glassmorphism)
       ============================================ */
    .hero-card {
      position: relative;
      width: 100%;
      max-width: 680px;
      padding: var(--space-12) var(--space-10);
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--zinc-200);
      border-radius: var(--radius-lg);
      text-align: center;
      overflow: hidden;
    }

    @supports not (backdrop-filter: blur(1px)) {
      .hero-card {
        background: rgba(255, 255, 255, 0.92);
      }
    }

    .hero-card__tagline {
      font-weight: 300;
      font-size: clamp(var(--text-2xl), 5vw, var(--text-4xl));
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--zinc-900);
      margin-bottom: var(--space-4);
    }

    .hero-card__teaser {
      font-weight: 400;
      font-size: var(--text-base);
      color: var(--zinc-500);
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto var(--space-10);
    }

    /* ============================================
       Waitlist Form (inside hero card)
       ============================================ */
    .waitlist-form {
      display: flex;
      gap: var(--space-2);
      max-width: 400px;
      margin: 0 auto;
    }

    /* Input — states: default, hover, focus-visible, error, disabled */
    .waitlist-form__input {
      flex: 1;
      min-height: 44px;
      padding: var(--space-3) var(--space-4);
      background: var(--white);
      color: var(--zinc-900);
      border: 1px solid var(--zinc-200);
      border-radius: var(--radius-sm);
      font-size: var(--text-sm);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .waitlist-form__input::placeholder {
      color: var(--zinc-400);
    }

    .waitlist-form__input:hover {
      border-color: var(--zinc-300);
    }

    .waitlist-form__input:focus-visible {
      border-color: var(--zinc-900);
      box-shadow: 0 0 0 3px rgba(9, 9, 11, 0.06);
      outline: none;
    }

    .waitlist-form__input.has-error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.06);
    }

    .waitlist-form__input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Button — states: default, hover, active, focus-visible, disabled, loading */
    .waitlist-form__btn {
      position: relative;
      min-height: 44px;
      padding: var(--space-3) var(--space-5);
      background: var(--zinc-900);
      color: var(--white);
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 500;
      font-size: var(--text-sm);
      white-space: nowrap;
      cursor: pointer;
      transition: background var(--transition);
    }

    .waitlist-form__btn:hover {
      background: var(--zinc-800);
    }

    .waitlist-form__btn:active {
      background: var(--zinc-950);
    }

    .waitlist-form__btn:focus-visible {
      outline: 2px solid var(--zinc-900);
      outline-offset: 2px;
    }

    .waitlist-form__btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .waitlist-form__btn.loading .btn-text {
      visibility: hidden;
    }

    .waitlist-form__btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 16px;
      margin: -8px 0 0 -8px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spinner 0.6s linear infinite;
    }

    @keyframes spinner {
      to { transform: rotate(360deg); }
    }

    /* Error message */
    .waitlist-form__error {
      font-size: var(--text-sm);
      color: var(--color-error);
      text-align: left;
      margin-top: var(--space-2);
    }

    /* Success */
    .waitlist-success {
      padding: var(--space-2) 0;
    }

    .waitlist-success__text {
      font-weight: 400;
      font-size: var(--text-base);
      color: var(--zinc-500);
    }

    /* ============================================
       Brand Values (below the card)
       ============================================ */
    .values {
      display: flex;
      justify-content: center;
      gap: var(--space-8);
      margin-top: var(--space-8);
      padding: 0 var(--space-6);
    }

    .values__item {
      font-weight: 400;
      font-size: var(--text-xs);
      color: var(--zinc-400);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ============================================
       Footer
       ============================================ */
    .site-footer {
      margin-top: auto;
      padding-top: var(--space-8);
      text-align: center;
    }

    .footer-copy {
      font-size: var(--text-xs);
      color: var(--zinc-400);
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 640px) {
      .page {
        padding: var(--space-10) 0 var(--space-8);
      }

      .logo {
        width: 130px;
        margin-bottom: var(--space-8);
      }

      .hero-card {
        margin: 0 var(--space-4);
        padding: var(--space-8) var(--space-6);
      }

      .hero-card__tagline {
        font-size: var(--text-xl);
      }

      .waitlist-form {
        flex-direction: column;
      }

      .values {
        gap: var(--space-4);
        flex-wrap: wrap;
      }

    }

    /* ============================================
       Reduced Motion
       ============================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }
  </style>
</head>

    <!-- Hero Card -->
    <div class="container">
      <div class="hero-card">
        <h1 class="hero-card__tagline">Your everyday,<br>on your terms.</h1>
        <p class="hero-card__teaser">Something thoughtful is taking shape. A wellness brand designed around the small daily moments that matter — and making them yours.</p>

        <form id="waitlist-form" class="waitlist-form" novalidate>
          <input
            type="email"
            id="email-input"
            class="waitlist-form__input"
            placeholder="you@example.com"
            autocomplete="email"
            required
            aria-label="Email address"
            aria-describedby="error-msg"
          >
          <button type="submit" id="submit-btn" class="waitlist-form__btn">
            <span class="btn-text">Join Waitlist</span>
          </button>
        </form>
        <p id="error-msg" class="waitlist-form__error" hidden aria-live="polite"></p>

        <div id="success-msg" class="waitlist-success" hidden>
          <p class="waitlist-success__text">You're on the list. We'll be in touch soon.</p>
        </div>

        <noscript>
          <p style="font-size: var(--text-sm); color: var(--zinc-500); margin-top: var(--space-4);">Please enable JavaScript to join the waitlist.</p>
        </noscript>
      </div>
    </div>

    <!-- Brand Values -->
    <div class="values" aria-label="Brand values">
      <span class="values__item">Independence</span>
      <span class="values__item">Dignity</span>
      <span class="values__item">Care</span>
      <span class="values__item">Simplicity</span>
    </div>

    <footer class="site-footer">
      <p class="footer-copy">&copy; 2026 Umpra</p>
    </footer>

  </main>

  <script>
    (function () {
      var WAITLIST_ENDPOINT = "YOUR_GOOGLE_SCRIPT_URL";
      // ^^^ Replace with your Google Apps Script web app URL
      // See README.md for setup instructions

      var form = document.getElementById('waitlist-form');
      var emailInput = document.getElementById('email-input');
      var submitBtn = document.getElementById('submit-btn');
      var errorMsg = document.getElementById('error-msg');
      var successMsg = document.getElementById('success-msg');
      var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.hidden = false;
        emailInput.classList.add('has-error');
      }

      function clearError() {
        errorMsg.textContent = '';
        errorMsg.hidden = true;
        emailInput.classList.remove('has-error');
      }

      function setLoading(on) {
        submitBtn.disabled = on;
        submitBtn.classList.toggle('loading', on);
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError();
        var email = emailInput.value.trim();

        if (!EMAIL_RE.test(email)) {
          showError('Please enter a valid email address.');
          emailInput.focus();
          return;
        }

        if (WAITLIST_ENDPOINT === 'YOUR_GOOGLE_SCRIPT_URL' || !WAITLIST_ENDPOINT.startsWith('https://')) {
          showError('Waitlist is not configured yet. Please check back later.');
          return;
        }

        setLoading(true);

        try {
          await fetch(WAITLIST_ENDPOINT, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ email: email })
          });
          form.hidden = true;
          successMsg.hidden = false;
        } catch (err) {
          showError('Something went wrong. Please try again.');
          setLoading(false);
        }
      });

      emailInput.addEventListener('input', function () {
        if (!errorMsg.hidden) clearError();
      });
    })();
  </script>

</body>
</html>
