<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umpra — Something Beautiful is Coming</title>
  <meta name="description" content="Umpra — your everyday, on your terms. A thoughtful approach to daily wellness is taking shape. Stay close.">

  <!-- Open Graph -->
  <meta property="og:title" content="Umpra — Something Beautiful is Coming">
  <meta property="og:description" content="Your everyday, on your terms. A thoughtful approach to daily wellness is taking shape.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://umpra.com">

  <!-- Google Fonts: DM Sans + Anonymous Pro -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:wght@400;700&family=DM+Sans:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================
       CSS Reset
       ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img, svg {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea {
      font: inherit;
      color: inherit;
    }

    ul, ol {
      list-style: none;
    }

    /* ============================================
       Custom Properties
       ============================================ */
    :root {
      --color-primary: #C85A2B;
      --color-primary-light: #E8804A;
      --color-primary-dark: #A04520;
      --color-secondary: #1E2A4A;
      --color-secondary-light: #2A3A62;
      --color-surface: #FDF6F0;
      --color-surface-alt: #F5EDE4;
      --color-text-light: #FDF6F0;
      --color-text-dark: #1E2A4A;
      --color-text-muted: #6B7A94;

      --glass-bg: rgba(253, 246, 240, 0.12);
      --glass-border: rgba(255, 255, 255, 0.18);
      --glass-shadow: rgba(30, 42, 74, 0.12);
      --glass-blur: 20px;

      --font-heading: 'DM Sans', sans-serif;
      --font-mono: 'Anonymous Pro', monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;
      --space-24: 96px;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ============================================
       Base Typography
       ============================================ */
    body {
      font-family: var(--font-heading);
      font-weight: 400;
      color: var(--color-text-dark);
      background-color: var(--color-surface);
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      line-height: 1.2;
    }

    code, pre, .mono {
      font-family: var(--font-mono);
    }

    /* ============================================
       Hero Section
       ============================================ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1E2A4A 0%, #162038 50%, #1A2542 100%);
      overflow: hidden;
      padding: var(--space-8);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 600px;
    }

    /* Logo */
    .hero-logo {
      width: 100%;
      max-width: 280px;
      margin-bottom: var(--space-16);
    }

    .hero-logo svg {
      width: 100%;
      height: auto;
    }

    /* Tagline */
    .hero-tagline {
      font-family: var(--font-heading);
      font-weight: 300;
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--color-surface);
      margin-bottom: var(--space-6);
      line-height: 1.3;
    }

    /* Teaser */
    .hero-teaser {
      font-family: var(--font-mono);
      font-weight: 400;
      font-size: clamp(0.875rem, 2vw, 1rem);
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    /* ============================================
       Logo Star Animation
       ============================================ */
    .logo-star {
      transform-origin: 729px 87px;
      animation: star-pulse 3s ease-in-out infinite;
    }

    @keyframes star-pulse {
      0%, 100% {
        opacity: 0.85;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* ============================================
       Floating Orbs
       ============================================ */
    .orbs-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      will-change: transform;
    }

    .orb--1 {
      width: 400px;
      height: 400px;
      top: 10%;
      left: -5%;
      background: radial-gradient(circle at 40% 40%,
        rgba(200, 90, 43, 0.25) 0%,
        rgba(200, 90, 43, 0.08) 50%,
        transparent 70%
      );
      animation: float-1 15s ease-in-out infinite;
    }

    .orb--2 {
      width: 500px;
      height: 500px;
      top: 50%;
      right: -10%;
      background: radial-gradient(circle at 60% 50%,
        rgba(30, 42, 74, 0.3) 0%,
        rgba(42, 58, 98, 0.1) 50%,
        transparent 70%
      );
      animation: float-2 20s ease-in-out infinite;
      animation-delay: -5s;
    }

    .orb--3 {
      width: 350px;
      height: 350px;
      bottom: 5%;
      left: 25%;
      background: radial-gradient(circle at 50% 60%,
        rgba(232, 128, 74, 0.2) 0%,
        rgba(200, 90, 43, 0.06) 50%,
        transparent 70%
      );
      animation: float-3 25s ease-in-out infinite;
      animation-delay: -10s;
    }

    .orb--4 {
      width: 300px;
      height: 300px;
      top: 30%;
      right: 20%;
      background: radial-gradient(circle at 50% 40%,
        rgba(42, 58, 98, 0.2) 0%,
        rgba(30, 42, 74, 0.06) 50%,
        transparent 70%
      );
      animation: float-1 18s ease-in-out infinite reverse;
      animation-delay: -7s;
    }

    @keyframes float-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    @keyframes float-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-25px, 20px) scale(1.03); }
      66% { transform: translate(15px, -25px) scale(0.97); }
    }

    @keyframes float-3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, 25px) scale(0.95); }
      66% { transform: translate(-30px, -10px) scale(1.05); }
    }

    /* ============================================
       Sections (placeholder structure)
       ============================================ */
    #waitlist {
      position: relative;
      z-index: 2;
    }

    #teaser {
      position: relative;
      z-index: 2;
    }

    /* ============================================
       Reduced Motion
       ============================================ */
    @media (prefers-reduced-motion: reduce) {
      .logo-star {
        animation: none;
        opacity: 1;
      }

      .orb {
        animation: none !important;
      }

      html {
        scroll-behavior: auto;
      }
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 640px) {
      .hero-logo {
        max-width: 200px;
        margin-bottom: var(--space-12);
      }

      .orb--1 { width: 250px; height: 250px; }
      .orb--2 { width: 300px; height: 300px; }
      .orb--3 { width: 200px; height: 200px; }
      .orb--4 { width: 180px; height: 180px; }
    }
  </style>
</head>
